<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Iron Stuffer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ══════════════════════════════════════════
   IRON STUFFER v3 — DESIGN SYSTEM
   Light mode (default) + Dark mode toggle
   ══════════════════════════════════════════ */
:root {
  /* Couleurs principales */
  --gold:#7c5cbf; --gold2:#9b7fd4; --gold-glow:#a87ee8;
  --gold-light:rgba(124,92,191,0.08); --gold-border:rgba(124,92,191,0.25);
  --green:#2ecc71; --green-bg:rgba(46,204,113,0.08);
  --yellow:#f39c12; --red:#e74c3c;

  /* Light mode surfaces */
  --bg:#fdfcff; --bg2:#f5f3fa; --bg3:#ede9f7; --surface:#fff;
  --surface-glass:rgba(255,255,255,0.72);
  --border:rgba(124,92,191,0.15); --text:#1a1025; --text-dim:#8878a8;

  /* Ombres */
  --radius:12px;
  --shadow:0 2px 8px rgba(124,92,191,0.10),0 6px 24px rgba(124,92,191,0.08);
  --shadow-hover:0 4px 16px rgba(124,92,191,0.18),0 8px 32px rgba(124,92,191,0.12);
  --shadow-card:0 1px 3px rgba(124,92,191,0.07),0 4px 16px rgba(124,92,191,0.10);

  /* Transitions */
  --t-fast:0.15s ease; --t-med:0.25s ease; --t-spring:0.35s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --bg:#0f0a1a; --bg2:#1a1030; --bg3:#231540; --surface:#160e2a;
  --surface-glass:rgba(22,14,42,0.80);
  --border:rgba(168,126,232,0.20); --text:#ede8ff; --text-dim:#8878a8;
  --gold:#a87ee8; --gold2:#c4a6f5; --gold-glow:#d0b8ff;
  --gold-light:rgba(168,126,232,0.12); --gold-border:rgba(168,126,232,0.30);
  --shadow:0 2px 8px rgba(0,0,0,0.40),0 6px 24px rgba(168,126,232,0.08);
  --shadow-hover:0 4px 20px rgba(168,126,232,0.25),0 8px 40px rgba(0,0,0,0.40);
  --shadow-card:0 1px 4px rgba(0,0,0,0.35),0 4px 20px rgba(168,126,232,0.10);
}

/* ── BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background var(--t-med),color var(--t-med)}
input,button,select{font-family:'Rajdhani',sans-serif}

/* ── KEYFRAMES ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slotPop{0%{transform:scale(1)}40%{transform:scale(1.055)}70%{transform:scale(0.97)}100%{transform:scale(1)}}
@keyframes statFlash{0%{color:var(--gold-glow)}60%{color:var(--gold-glow)}100%{color:inherit}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(253,252,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--gold-border);display:flex;align-items:center;padding:0 16px;height:52px;transition:background var(--t-med),border-color var(--t-med)}
[data-theme="dark"] .hdr{background:rgba(15,10,26,0.88)}
.hdr-back{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:4px 8px 4px 0;display:none;transition:color var(--t-fast)}
.hdr-back.visible{display:block}
.hdr-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase;flex:1;transition:color var(--t-fast)}
.hdr-sub{font-size:11px;color:var(--text-dim);letter-spacing:1.5px}

/* Dark mode toggle */
.theme-toggle{background:none;border:1px solid var(--gold-border);border-radius:20px;color:var(--gold);font-size:14px;cursor:pointer;padding:3px 10px;margin-left:8px;transition:all var(--t-fast);white-space:nowrap;line-height:1.4}
.theme-toggle:hover{background:var(--gold-light);border-color:var(--gold)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(253,252,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--gold-border);display:flex;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));position:fixed;transition:background var(--t-med),border-color var(--t-med)}
[data-theme="dark"] .bottom-nav{background:rgba(15,10,26,0.88)}
.bnav-inner{display:flex;flex:1;position:relative}
.bnav-pill{position:absolute;bottom:2px;height:3px;border-radius:2px;background:var(--gold);transition:left var(--t-spring),width var(--t-spring),background var(--t-fast);pointer-events:none}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;padding:3px 0;transition:color var(--t-fast);position:relative}
.bnav-btn .ico{font-size:20px;display:flex;align-items:center;justify-content:center;width:26px;height:26px;transition:transform var(--t-spring)}
.bnav-btn.active{color:var(--gold)}
.bnav-btn.active .ico{transform:scale(1.15)}

/* ── CONTENT & VIEW TRANSITIONS ── */
.content{padding-top:60px;padding-bottom:70px;min-height:100vh}
.view{display:none;opacity:0}
.view.active{display:block;animation:fadeSlideIn 0.22s ease forwards}

/* ── PERSOS ── */
.persos-header{padding:16px;font-family:'Cinzel',serif;font-size:11px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
.compte-section{margin-bottom:8px;padding:0 12px}
.compte-title{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:8px 0 6px}
.perso-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.perso-card{background:var(--surface-glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all var(--t-med);display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-card)}
.perso-card:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.perso-card-ico{width:36px;height:36px;object-fit:contain;border-radius:8px}
.perso-card-name{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text)}
.perso-card-classe{font-size:10px;color:var(--text-dim);letter-spacing:1.5px}

/* ── BUILDS ── */
.builds-header{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.builds-grid{display:grid;grid-template-columns:1fr;gap:8px;padding:0 12px}
.build-card{background:var(--surface-glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all var(--t-med);box-shadow:var(--shadow-card)}
.build-card:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.build-card-ico{font-size:22px}
.build-card-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text);flex:1;letter-spacing:0.5px}
.build-card-meta{font-size:11px;color:var(--text-dim)}
.build-card-edit{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text-dim);padding:4px;transition:color var(--t-fast)}
.build-card-edit:hover{color:var(--gold)}
.add-build-btn{margin:8px 12px 0;width:calc(100% - 24px);background:var(--gold-light);border:2px dashed var(--gold-border);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;padding:12px;border-radius:var(--radius);cursor:pointer;transition:all var(--t-med)}
.add-build-btn:hover{background:rgba(124,92,191,0.15);border-color:var(--gold);transform:translateY(-1px)}

/* ── STUFFER LAYOUT ── */
.stuffer-wrap{padding:12px}
.stuffer-grid{display:grid;grid-template-columns:1fr 80px 1fr;gap:8px;margin-bottom:10px}
.stuffer-col{display:flex;flex-direction:column;gap:6px}
.stuffer-center{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:4px}
.class-avatar{width:68px;height:68px;object-fit:contain;border-radius:50%;background:var(--bg2);border:2px solid var(--gold-border);padding:4px;box-shadow:0 0 0 4px var(--gold-light),var(--shadow);transition:box-shadow var(--t-med)}

/* Slots équipement — glassmorphism */
.eq-slot{background:var(--surface-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;transition:all var(--t-med);min-height:54px;display:flex;flex-direction:column;gap:3px;position:relative;box-shadow:var(--shadow-card)}
.eq-slot:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.eq-slot.active{border-color:var(--gold);border-width:2px;background:var(--gold-light);box-shadow:0 0 0 3px rgba(124,92,191,0.15),var(--shadow)}
.eq-slot.filled{background:var(--surface-glass)}
.eq-slot.just-equipped{animation:slotPop 0.38s var(--t-spring) forwards}
.slot-lbl{font-size:8px;color:var(--text-dim);font-weight:700;letter-spacing:2px;text-transform:uppercase}
.slot-body{display:flex;align-items:center;gap:6px;flex:1}
.slot-ico{width:28px;height:28px;object-fit:contain;border-radius:6px;flex-shrink:0}
.slot-item-name{font-size:11px;font-weight:700;color:var(--text);flex:1;line-height:1.2}
.slot-source{font-size:9px;font-weight:700;white-space:nowrap}
.slot-empty{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.slot-clear{position:absolute;top:4px;right:4px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;line-height:1;padding:2px;opacity:0;transition:opacity var(--t-fast)}
.eq-slot:hover .slot-clear{opacity:1}

/* Pastilles */
.slot-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.slot-dot.green{background:var(--green)}
.slot-dot.yellow{background:var(--yellow)}

/* Dofus row */
.dofus-row{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.dofus-slot{background:var(--surface-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all var(--t-med);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 2px;min-height:52px;position:relative;box-shadow:var(--shadow-card)}
.dofus-slot:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-1px);box-shadow:var(--shadow-hover)}
.dofus-slot.active{border-color:var(--gold);border-width:2px;box-shadow:0 0 0 3px rgba(124,92,191,0.15),var(--shadow)}
.dofus-slot.filled{background:var(--surface-glass)}
.dofus-slot.just-equipped{animation:slotPop 0.38s var(--t-spring) forwards}
.dofus-slot img{width:32px;height:32px;object-fit:contain}
.dofus-lbl{font-size:7px;color:var(--text-dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-top:2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dofus-clear{position:absolute;top:2px;right:2px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:10px;padding:1px;opacity:0}
.dofus-slot:hover .dofus-clear{opacity:1}

/* ── STATS PANEL ── */
.stats-panel{background:var(--surface-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:var(--shadow-card)}
.stats-title{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.stat-item{background:var(--bg2);border-radius:8px;padding:6px 8px;text-align:center}
.stat-name{font-size:8px;color:var(--text-dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:2px}
.stat-val{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text)}
.stat-val.pos{color:var(--green)}
.stat-val.neg{color:var(--red)}

/* ── PAGE SÉLECTION ITEM ── */
.select-header{padding:12px 16px;background:var(--surface-glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:50}
.select-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:6px}
.select-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;transition:border-color var(--t-fast)}
.select-search:focus{border-color:var(--gold)}
.select-empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.select-empty-ico{font-size:40px;margin-bottom:12px}
.select-empty-txt{font-size:13px;line-height:1.5}
.item-cards{display:flex;flex-direction:column;gap:8px;padding:12px}
.item-card{background:var(--surface-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;display:flex;gap:12px;transition:all var(--t-med);box-shadow:var(--shadow-card)}
.item-card:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px);box-shadow:var(--shadow-hover)}
.item-card-ico{width:48px;height:48px;object-fit:contain;border-radius:8px;background:var(--bg2);flex-shrink:0;border:1px solid var(--border)}
.item-card-body{flex:1;min-width:0}
.item-card-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;letter-spacing:0.3px}
.item-card-type{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.item-card-stats{display:flex;flex-wrap:wrap;gap:4px}
.stat-chip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--bg2)}
.stat-chip.pos{color:var(--green)}
.stat-chip.neg{color:var(--red)}
.stat-chip.exo{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-border)}
.item-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.item-card-dot.green{background:var(--green)}
.item-card-dot.yellow{background:var(--yellow)}
.item-card-dot.grey{background:var(--border)}

/* ── BANQUE ── */
.bank-header{padding:16px;display:flex;align-items:center;justify-content:space-between}
.bank-add-btn{background:var(--gold-light);border:1px solid var(--gold-border);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all var(--t-fast)}
.bank-add-btn:hover{background:rgba(124,92,191,0.18);transform:translateY(-1px)}
.bank-filters{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto}
.bank-list{display:flex;flex-direction:column;gap:8px;padding:0 12px 12px}
.bank-item{background:var(--surface-glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow-card);transition:box-shadow var(--t-fast)}
.bank-item:hover{box-shadow:var(--shadow-hover)}
.bank-item-ico{width:44px;height:44px;object-fit:contain;border-radius:8px;background:var(--bg2);border:1px solid var(--border);flex-shrink:0}
.bank-item-body{flex:1;min-width:0}
.bank-item-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;letter-spacing:0.3px}
.bank-item-meta{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.bank-item-stats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.bank-item-actions{display:flex;gap:6px;margin-top:8px}
.bank-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all var(--t-fast)}
.bank-btn:hover{border-color:var(--gold);color:var(--gold)}
.bank-btn.primary{background:var(--gold-light);border-color:var(--gold-border);color:var(--gold)}
.bank-btn.danger{background:#fff0ee;border-color:#fccbc7;color:var(--red)}
[data-theme="dark"] .bank-btn.danger{background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.35)}
.bank-item-usage{font-size:10px;color:var(--text-dim);font-style:italic;margin-top:4px}
.bank-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* ── ITEMS LIBRES ── */
.free-items-section{padding:12px}
.free-items-header{font-family:'Cinzel',serif;font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.free-count{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold-border);border-radius:10px;padding:1px 8px;font-family:'Rajdhani',sans-serif;font-size:11px}

/* ── TOOLTIP ── */
#stuffTooltip{display:none;position:fixed;z-index:999;background:rgba(15,8,32,0.97);border:1px solid var(--gold-border);border-radius:14px;padding:12px 14px;max-width:220px;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(168,126,232,0.1);font-family:'Rajdhani',sans-serif;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;border-top:1px solid var(--gold-border);box-shadow:0 -8px 40px rgba(124,92,191,0.15)}
.modal-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;color:var(--text-dim);cursor:pointer;padding:0 4px;transition:color var(--t-fast)}
.modal-close:hover{color:var(--gold)}
.modal-item-preview{background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.modal-item-preview img{width:40px;height:40px;object-fit:contain;border-radius:6px}
.modal-item-preview-name{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text)}
.modal-item-preview-type{font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:1.5px}
.modal-section-title{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px}
.stat-edit-grid{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.stat-edit-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:8px;padding:6px 10px}
.stat-edit-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.stat-edit-input{width:70px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;font-weight:700;color:var(--gold);text-align:right;font-family:'Cinzel',serif}
.exo-row{background:var(--gold-light);border:1px solid var(--gold-border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px}
.exo-name{font-size:12px;font-weight:700;color:var(--gold);flex:1}
.compte-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.compte-chip{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all var(--t-fast)}
.compte-chip.active{background:var(--gold-light);border-color:var(--gold-border);color:var(--gold)}
.modal-search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text);outline:none;margin-bottom:8px;transition:border-color var(--t-fast)}
.modal-search-input:focus{border-color:var(--gold)}
.search-btn{width:100%;background:var(--gold);color:#fff;border:none;border-radius:8px;padding:10px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:opacity var(--t-fast)}
.search-btn:hover{opacity:0.88}
.modal-results{max-height:200px;overflow-y:auto;margin-top:8px}
.modal-result-row{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:background var(--t-fast)}
.modal-result-row:hover{background:var(--bg2)}
.modal-result-ico{width:32px;height:32px;object-fit:contain;border-radius:6px;background:var(--bg2)}
.modal-result-name{font-size:12px;font-weight:700;color:var(--text);flex:1}
.modal-result-type{font-size:10px;color:var(--text-dim)}
.modal-footer{display:flex;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.modal-btn{flex:1;padding:11px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:none;transition:opacity var(--t-fast)}
.modal-btn:hover{opacity:0.88}
.modal-btn.cancel{background:var(--bg2);color:var(--text-dim)}
.modal-btn.save{background:var(--gold);color:#fff}
.modal-btn.danger{background:var(--red);color:#fff}
.exo-add-section{background:var(--bg2);border-radius:10px;padding:10px;margin-bottom:10px}
.exo-select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;color:var(--text);margin-bottom:8px}
.exo-val-row{display:flex;gap:6px}
.exo-val-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:13px;color:var(--text)}
.exo-confirm-btn{background:var(--gold);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.build-modal-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Cinzel',serif;color:var(--text);outline:none;margin-bottom:12px;transition:border-color var(--t-fast)}
.build-modal-input:focus{border-color:var(--gold)}

/* ── Helpers ── */
.empty-state{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:13px;background:var(--bg2);border-radius:var(--radius)}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:20px;color:var(--text-dim);font-size:13px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.6s linear infinite}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:rgba(15,8,32,0.97);color:#fff;font-size:13px;font-weight:700;padding:10px 20px;border-radius:24px;z-index:300;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;border:1px solid var(--gold-border);box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.section-label{font-size:9px;color:var(--text-dim);font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:12px 12px 4px}

/* ── STATS COMPACTES ── */
.stats-rows-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 8px}
.stat-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;transition:background var(--t-fast)}
.stat-row:hover{background:var(--bg2)}
.stat-row-name{display:flex;align-items:center;gap:5px;flex:1;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.stat-row-name img{width:14px;height:14px;object-fit:contain;flex-shrink:0}
.stat-row-val{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text);min-width:36px;text-align:right}
.stat-row-val.pos{color:var(--green)}
.stat-row-val.neg{color:var(--red)}
.stat-row-val.anim{animation:statFlash 0.7s ease forwards}

/* Pastilles */
.slot-dot.red,.item-card-dot.red,.bank-item-dot.red{background:#e74c3c}
.stat-chip.over-chip{background:rgba(124,92,191,0.15);border:1px solid var(--gold-border);color:var(--gold);font-weight:700}

/* Filtres banque */
.bank-filter{background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all var(--t-fast)}
.bank-filter.active{background:var(--gold-light);border-color:var(--gold-border);color:var(--gold)}
.bank-filter:hover{border-color:var(--gold);color:var(--gold)}

/* ── AUTH BUTTON ── */
.auth-btn{background:none;border:1px solid var(--gold-border);border-radius:20px;color:var(--text-dim);font-size:12px;font-weight:700;cursor:pointer;padding:3px 10px;margin-right:6px;transition:all var(--t-fast);font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.auth-btn:hover{background:var(--gold-light);border-color:var(--gold);color:var(--gold)}
.auth-btn.connected{color:var(--green);border-color:rgba(46,204,113,0.35)}
.auth-btn.connected:hover{background:rgba(46,204,113,0.08)}

/* ── SYNC INDICATOR ── */
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--yellow);animation:spin 1s linear infinite}
.sync-dot.offline{background:var(--text-dim)}
</style>

</head>
<body>

<!-- HEADER -->
<div class="hdr" id="hdr">
  <button class="hdr-back" id="hdrBack" onclick="goBack()">←</button>
  <div style="flex:1">
    <div class="hdr-title" id="hdrTitle">IRON STUFFER</div>
    <div class="hdr-sub" id="hdrSub">Gestionnaire de builds</div>
  </div>
  <button class="auth-btn" id="authBtn" onclick="handleAuth()">⏳</button>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- VUE PERSOS -->
  <div class="view active" id="view-persos"></div>

  <!-- VUE BUILDS -->
  <div class="view" id="view-builds"></div>

  <!-- VUE STUFFER -->
  <div class="view" id="view-stuffer"></div>

  <!-- VUE SÉLECTION ITEM -->
  <div class="view" id="view-select"></div>

  <!-- VUE BANQUE -->
  <div class="view" id="view-bank"></div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="bnav-inner" id="bnavInner">
    <div class="bnav-pill" id="bnavPill"></div>
    <button class="bnav-btn active" id="nav-persos" onclick="showView('persos')">
      <span class="ico" id="ico-persos">👤</span>
      Persos
    </button>
    <button class="bnav-btn" id="nav-bank" onclick="showView('bank')">
      <span class="ico" id="ico-bank">🏦</span>
      Banque
    </button>
  </div>
</div>

<!-- TOOLTIP -->
<div id="stuffTooltip"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL BANQUE -->
<div class="modal-overlay" id="modalBank" onclick="if(event.target===this)closeModal('modalBank')">
  <div class="modal">
    <div class="modal-title">
      <span id="modalBankTitle">Ajouter un item</span>
      <button class="modal-close" onclick="closeModal('modalBank')">✕</button>
    </div>

    <!-- Section recherche -->
    <div id="modalSearchSection">
      <div class="modal-section-title">Rechercher dans le jeu</div>
      <input class="modal-search-input" id="modalSearchInput" placeholder="Nom de l'item..." onkeydown="if(event.key==='Enter')modalSearch()">
      <button class="search-btn" onclick="modalSearch()">🔍 Rechercher</button>
      <div class="modal-results" id="modalSearchResults"></div>
    </div>

    <!-- Section item sélectionné -->
    <div id="modalItemSection" style="display:none">
      <div class="modal-item-preview">
        <img id="modalItemIco" src="" style="width:40px;height:40px;object-fit:contain;border-radius:6px;background:var(--bg2)" onerror="this.style.display='none'">
        <div>
          <div class="modal-item-preview-name" id="modalItemName"></div>
          <div class="modal-item-preview-type" id="modalItemType"></div>
        </div>
        <button onclick="resetModalItem()" style="margin-left:auto;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px">✕</button>
      </div>

      <div class="modal-section-title">Stats réelles (ton jet)</div>
      <div id="modalStatGrid"></div>

      <!-- Exos -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div class="modal-section-title" style="margin:0">Forgemagies (exos)</div>
        <button onclick="toggleAddExo()" style="background:var(--gold-light);border:1px solid var(--gold-border);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer">⚡ Ajouter</button>
      </div>
      <div id="exoAddSection" style="display:none">
        <div class="exo-add-section">
          <select class="exo-select" id="exoStatSelect"></select>
          <div class="exo-val-row">
            <input class="exo-val-input" type="number" id="exoValInput" placeholder="Valeur (ex: 1)">
            <button class="exo-confirm-btn" onclick="confirmAddExo()">Confirmer</button>
            <button onclick="toggleAddExo()" style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;cursor:pointer;font-size:13px">✕</button>
          </div>
        </div>
      </div>

      <div class="modal-section-title">Compte</div>
      <div class="compte-chips" id="modalCompteChips"></div>
    </div>

    <div class="modal-footer">
      <button class="modal-btn cancel" onclick="closeModal('modalBank')">Annuler</button>
      <button class="modal-btn danger" id="modalBankDelete" onclick="deleteBankItem()" style="display:none;flex:0.6">🗑</button>
      <button class="modal-btn save" onclick="saveBankItem()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL BUILD -->
<div class="modal-overlay" id="modalBuild" onclick="if(event.target===this)closeModal('modalBuild')">
  <div class="modal">
    <div class="modal-title">
      <span id="modalBuildTitle">Nouveau build</span>
      <button class="modal-close" onclick="closeModal('modalBuild')">✕</button>
    </div>
    <div class="modal-section-title">Nom du build</div>
    <input class="build-modal-input" id="modalBuildInput" placeholder="Ex: Build Feu PvP">
    <div class="modal-footer">
      <button class="modal-btn cancel" onclick="closeModal('modalBuild')">Annuler</button>
      <button class="modal-btn danger" id="modalBuildDelete" onclick="deleteBuild()" style="display:none;flex:0.6">🗑</button>
      <button class="modal-btn save" onclick="saveBuildName()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
var API = 'https://api.dofusdu.de/dofus3/v1/fr';
var STORAGE_KEY = 'iron_stuffer_v2';

// Comptes et persos Iron Team
var COMPTES = [
  {id:'c1', name:'Compte 1', persos:[
    {id:'wall',   name:'Iron-Wall',    classe:'Féca'},
    {id:'piloo',  name:'Iron-Piloo',   classe:'Ecaflip'},
    {id:'soma',   name:'Iron-Soma',    classe:'Eliotrope'},
    {id:'clock',  name:'Iron-Clock',   classe:'Xélor'},
    {id:'sniper', name:'Iron-Sniper',  classe:'Crâ'}
  ]},
  {id:'c2', name:'Compte 2', persos:[
    {id:'earth',   name:'Iron-Earth',   classe:'Sadida'},
    {id:'chon',    name:'Iron-Chon',    classe:'Eniripsa'},
    {id:'bramble', name:'Iron-Bramble', classe:'Roublard'},
    {id:'flex',    name:'Iron-Flex',    classe:'Sacrieur'},
    {id:'almanax', name:'Iron-Almanax', classe:'Enutrof'}
  ]},
  {id:'c3', name:'Compte 3', persos:[
    {id:'stanley',  name:'Iron-Stanley',  classe:'Steamer'},
    {id:'quiver',   name:'Iron-Quiver',   classe:'Crâ'},
    {id:'bambou',   name:'Iron-Bambou',   classe:'Pandawa'},
    {id:'dog',      name:'Iron-Dog',      classe:'Ouginak'},
    {id:'corazon',  name:'Iron-Corazon',  classe:'Iop'}
  ]},
  {id:'c4', name:'Compte 4', persos:[
    {id:'toys',    name:'Iron-Toys',    classe:'Steamer'},
    {id:'turrets', name:'Iron-Turrets', classe:'Steamer'},
    {id:'majax',   name:'Iron-Majax',   classe:'Ecaflip'},
    {id:'circus',  name:'Iron-Circus',  classe:'Zobal'},
    {id:'scars',   name:'Iron-Scars',   classe:'Sacrieur'}
  ]},
  {id:'c5', name:'Compte 5', persos:[
    {id:'ironi', name:'Iron-I',    classe:'Iop'},
    {id:'blood', name:'Iron-Blood',classe:'Sacrieur'},
    {id:'sm',    name:'Iron-SM',   classe:'Huppermage'}
  ]},
  {id:'c6', name:'Compte 6', persos:[
    {id:'ironv',   name:'Iron-V',      classe:'Forgelance'},
    {id:'brawler', name:'Iron-Brawler',classe:'Iop'},
    {id:'bush',    name:'Iron-Bush',   classe:'Sadida'},
    {id:'bomb',    name:'Iron-Bomb',   classe:'Roublard'},
    {id:'trap',    name:'Iron-Trap',   classe:'Sram'}
  ]}
];

var SLOTS_LEFT = [
  {id:'chapeau',  lbl:'Chapeau',  ico:'🎩', types:['Chapeau']},
  {id:'amulette', lbl:'Amulette', ico:'📿', types:['Amulette']},
  {id:'cape',     lbl:'Cape',     ico:'🪄', types:['Cape']},
  {id:'ceinture', lbl:'Ceinture', ico:'👜', types:['Ceinture']},
  {id:'anneau1',  lbl:'Anneau 1', ico:'💍', types:['Anneau']},
  {id:'anneau2',  lbl:'Anneau 2', ico:'💍', types:['Anneau']}
];

var SLOTS_RIGHT = [
  {id:'arme',    lbl:'Arme',     ico:'⚔️',  types:['Épée','Arc','Baguette','Bâton','Dague','Faux','Marteau','Pelle','Pioche','Hache']},
  {id:'bouclier',lbl:'Bouclier', ico:'🛡️',  types:['Bouclier']},
  {id:'bottes',  lbl:'Bottes',   ico:'👢',  types:['Bottes']},
  {id:'monture', lbl:'Familier', ico:'🐾',  types:['Familier','Dragodinde','Montilier','Muldo','Volkorne']}
];

var DOFUS_SLOTS = ['dofus1','dofus2','dofus3','dofus4','dofus5','dofus6'];
var DOFUS_TYPES = ['Dofus','Trophée','Prysmaradite'];

var STATS_LIST = ['PA','PM','PO','Do Critique','% Do Sorts','% Do Dist','% Do Mélée',
  'Do Feu','Do Terre','Do Eau','Do Air','% Rés Neutre','% Rés Air','% Rés Eau',
  '% Rés Feu','% Rés Terre','% Rés Dist','% Rés Mélée','Tacle','Ret. PM','Critique'];

var BASE_STATS = {
  PA:7, PM:3, PO:0, Pods:1000, PI:1,
  Vitalité:0, Sagesse:0, Force:0, Intelligence:0, Agilité:0, Chance:0,
  Initiative:0, '% Critique':0, Prospection:0, Soin:0, Tacle:0, Fuite:0
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
var state = {builds:{}, bank:[]};
var nav = {view:'persos', persoId:null, buildId:null, activeSlot:null, selectSlotId:null, selectSlotTypes:[], bankFilters:[]};
var modalBankData = {item:null, editIdx:null, compte:null, nativeKeys:[]};
var modalBuildData = {persoId:null, buildId:null};
var modalSearchCache = [];

function loadState(){
  try{
    var s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    state.builds=s.builds||{};
    state.bank=s.bank||[];
  }catch(e){}
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  // Sync Firestore si connecté
  if(window._fbUser && window._fsDb){
    var uid=window._fbUser.uid;
    window._syncPending=true;
    updateSyncDot('syncing');
    clearTimeout(window._syncTimer);
    window._syncTimer=setTimeout(function(){
      window._fsDb.collection('users').doc(uid).collection('data').doc('state').set({
        builds: state.builds,
        bank: state.bank,
        updatedAt: new Date().toISOString()
      }).then(function(){
        window._syncPending=false;
        updateSyncDot('ok');
      }).catch(function(e){
        console.warn('Firestore save error', e);
        updateSyncDot('offline');
      });
    }, 800); // debounce 800ms pour éviter trop d'écritures
  }
}
function getBuilds(pid){ return state.builds[pid]||[]; }
function getBuild(pid,bid){ return (state.builds[pid]||[]).filter(function(b){return b.id===bid;})[0]||null; }
function persoById(pid){
  for(var i=0;i<COMPTES.length;i++){
    for(var j=0;j<COMPTES[i].persos.length;j++){
      if(COMPTES[i].persos[j].id===pid) return COMPTES[i].persos[j];
    }
  }
  return null;
}
function compteOfPerso(pid){
  for(var i=0;i<COMPTES.length;i++){
    for(var j=0;j<COMPTES[i].persos.length;j++){
      if(COMPTES[i].persos[j].id===pid) return COMPTES[i];
    }
  }
  return null;
}

// ════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════
function updateNavPill(){
  var inner=document.getElementById('bnavInner');
  var activeBtn=inner&&inner.querySelector('.bnav-btn.active');
  var pill=document.getElementById('bnavPill');
  if(!activeBtn||!pill||!inner) return;
  var innerRect=inner.getBoundingClientRect();
  var btnRect=activeBtn.getBoundingClientRect();
  pill.style.left=(btnRect.left-innerRect.left+btnRect.width*0.2)+'px';
  pill.style.width=(btnRect.width*0.6)+'px';
}

function showView(v){
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('active');});
  document.getElementById('view-'+v).classList.add('active');
  nav.view=v;
  // Nav buttons
  document.querySelectorAll('.bnav-btn').forEach(function(b){b.classList.remove('active');});
  if(v==='persos'||v==='builds'||v==='stuffer'||v==='select'){
    document.getElementById('nav-persos').classList.add('active');
  } else if(v==='bank'){
    document.getElementById('nav-bank').classList.add('active');
  }
  updateNavPill();
  // Header
  var back = document.getElementById('hdrBack');
  var title = document.getElementById('hdrTitle');
  var sub = document.getElementById('hdrSub');
  if(v==='persos'){
    back.classList.remove('visible');
    title.textContent='IRON STUFFER';
    sub.textContent='Gestionnaire de builds';
  } else if(v==='builds'){
    back.classList.add('visible');
    var p=persoById(nav.persoId);
    title.textContent=p?p.name:'Builds';
    sub.textContent=p?p.classe:'';
  } else if(v==='stuffer'){
    back.classList.add('visible');
    var b=getBuild(nav.persoId,nav.buildId);
    title.textContent=b?b.name:'Build';
    var p2=persoById(nav.persoId);
    sub.textContent=p2?p2.name+' — '+p2.classe:'';
  } else if(v==='select'){
    back.classList.add('visible');
    title.textContent='Choisir un item';
    var sl=getSlotLabel(nav.selectSlotId);
    sub.textContent=sl;
  } else if(v==='bank'){
    back.classList.remove('visible');
    title.textContent='MA BANQUE';
    sub.textContent='Mes équipements';
  }
}

function goBack(){
  if(nav.view==='builds'){ showView('persos'); }
  else if(nav.view==='stuffer'){ showView('builds'); renderBuilds(); }
  else if(nav.view==='select'){ showView('stuffer'); renderStuffer(); }
}

function openPerso(pid){
  nav.persoId=pid;
  nav.buildId=null;
  showView('builds');
  renderBuilds();
}

function openBuild(bid){
  nav.buildId=bid;
  nav.activeSlot=null;
  showView('stuffer');
  renderStuffer();
}

function getSlotLabel(id){
  if(!id) return '';
  var all=SLOTS_LEFT.concat(SLOTS_RIGHT);
  for(var i=0;i<all.length;i++) if(all[i].id===id) return all[i].lbl;
  if(DOFUS_SLOTS.indexOf(id)>=0) return 'Dofus / Trophée / Prysmaradite';
  return id;
}

// ════════════════════════════════════════════════

function getClassIcon(classe){
  if(CLASS_ICONS_STUFFER[classe]){
    return '<img class="class-avatar" src="'+CLASS_ICONS_STUFFER[classe]+'" alt="'+classe+'">';
  }
  var map={'Féca':'🛡️','Osamodas':'🐲','Enutrof':'⛏️','Sram':'💀','Xélor':'⌛',
    'Ecaflip':'🎲','Eniripsa':'💊','Iop':'⚔️','Crâ':'🏹','Sadida':'🌿',
    'Sacrieur':'🔥','Pandawa':'🐼','Roublard':'💣','Zobal':'🎭','Steamer':'⚙️',
    'Eliotrope':'🌀','Huppermage':'✨','Ouginak':'🐕','Forgelance':'🗡️'};

}

function renderPersos(){
  var h='';
  COMPTES.forEach(function(c){
    h+='<div class="compte-section">';
    h+='<div class="compte-title">'+c.name+'</div>';
    h+='<div class="perso-grid">';
    c.persos.forEach(function(p){
      var builds=getBuilds(p.id);
      h+='<div class="perso-card" data-pid="'+p.id+'" onclick="openPerso(this.dataset.pid)">';
      if(CLASS_ICONS_STUFFER[p.classe]){
        h+='<img class="perso-card-ico" src="'+CLASS_ICONS_STUFFER[p.classe]+'" alt="'+p.classe+'">';
      } else {
        var ico={'Féca':'🛡️','Osamodas':'🐲','Enutrof':'⛏️','Sram':'💀','Xélor':'⌛','Ecaflip':'🎲','Eniripsa':'💊','Iop':'⚔️','Crâ':'🏹','Sadida':'🌿','Sacrieur':'🔥','Pandawa':'🐼','Roublard':'💣','Zobal':'🎭','Steamer':'⚙️','Eliotrope':'🌀','Huppermage':'✨','Ouginak':'🐕','Forgelance':'🗡️'};
        h+='<span style="font-size:28px;width:36px;text-align:center">'+(ico[p.classe]||'⚔️')+'</span>';
      }
      h+='<div>';
      h+='<div class="perso-card-name">'+p.name+'</div>';
      h+='<div class="perso-card-classe">'+p.classe+' · '+builds.length+' build'+(builds.length!==1?'s':'')+'</div>';
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  document.getElementById('view-persos').innerHTML=h;
}

function renderBuilds(){
  var p=persoById(nav.persoId);
  if(!p) return;
  var builds=getBuilds(nav.persoId);
  var h='<div class="builds-header">';
  h+='<div style="font-family:\'Cinzel\',serif;font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase">'+builds.length+' build'+(builds.length!==1?'s':'')+'</div>';
  h+='</div>';
  h+='<div class="builds-grid">';
  builds.forEach(function(b){
    var slotCount=b.slots?Object.values(b.slots).filter(function(s){return s&&s.name;}).length:0;
    h+='<div class="build-card" data-bid="'+b.id+'" onclick="openBuild(this.dataset.bid)">';
    h+=getClassIcon(p.classe).replace('class-avatar','').replace('style="','style="width:40px;height:40px;');
    h+='<div style="flex:1">';
    h+='<div class="build-card-name">'+b.name+'</div>';
    h+='<div class="build-card-meta">'+slotCount+' item'+(slotCount!==1?'s':'')+' équipé'+(slotCount!==1?'s':'')+'</div>';
    h+='</div>';
    h+='<button class="build-card-edit" data-pid="'+nav.persoId+'" data-bid="'+b.id+'" onclick="event.stopPropagation();openModalBuild(this.dataset.pid,this.dataset.bid)">✏️</button>';
    h+='</div>';
  });
  h+='</div>';
  if(builds.length<6){
    h+='<button class="add-build-btn" data-pid="'+nav.persoId+'" onclick="openModalBuild(this.dataset.pid,null)">+ Nouveau build</button>';
  }
  document.getElementById('view-builds').innerHTML=h;
}

function renderStuffer(){
  var p=persoById(nav.persoId);
  var b=getBuild(nav.persoId,nav.buildId);
  if(!p||!b) return;

  // Mettre à jour header
  document.getElementById('hdrTitle').textContent=b.name;
  document.getElementById('hdrSub').textContent=p.name+' — '+p.classe;

  var slots=b.slots||{};
  var h='<div class="stuffer-wrap">';

  // ── Layout 3 colonnes ──
  h+='<div class="stuffer-grid">';

  // Colonne gauche
  h+='<div class="stuffer-col">';
  SLOTS_LEFT.forEach(function(sl){ h+=renderSlot(sl, slots[sl.id]); });
  h+='</div>';

  // Centre : icône classe + dofus empilés
  h+='<div class="stuffer-center">';
  h+=getClassIcon(p.classe);
  h+='</div>';

  // Colonne droite
  h+='<div class="stuffer-col">';
  SLOTS_RIGHT.forEach(function(sl){ h+=renderSlot(sl, slots[sl.id]); });
  h+='</div>';

  h+='</div>'; // fin stuffer-grid

  // ── Dofus/Trophées/Prysmaradite ──
  h+='<div class="section-label">Dofus · Trophées · Prysmaradite</div>';
  h+='<div class="dofus-row">';
  DOFUS_SLOTS.forEach(function(id,i){
    var item=slots[id];
    var isActive=nav.activeSlot===id;
    h+='<div class="dofus-slot '+(item?'filled':'')+(isActive?' active':'')+'" data-slotid="'+id+'" onclick="selectSlot(this.dataset.slotid)">';
    if(item&&item.icon){
      h+='<img src="'+item.icon+'" data-slotid="'+id+'" onerror="this.style.display=\'none\'" style="width:32px;height:32px;object-fit:contain">';
    } else {
      h+='<span style="font-size:20px">🥚</span>';
    }
    h+='<div class="dofus-lbl">'+(item?item.name.substring(0,7):'Slot '+(i+1))+'</div>';
    if(item) h+='<button class="dofus-clear" data-slotid="'+id+'" onclick="event.stopPropagation();clearSlot(this.dataset.slotid)">✕</button>';
    if(item&&item.bankRef!==undefined) h+=renderDots(getItemDotFromBank(item.bankRef)).replace('slot-dot','dofus-dot');
    h+='</div>';
  });
  h+='</div>';

  // ── Stats ──
  h+=renderStats(slots);

  // ── Répartition points ──
  h+=renderInvestedBlock();

  // ── Panoplies ──
  h+=renderPanoplies(slots);

  h+='</div>'; // fin stuffer-wrap

  document.getElementById('view-stuffer').innerHTML=h;

  // Micro-animation : flash sur les valeurs de stats qui ont changé
  var prevTotals=window._prevTotals||{};
  var currTotals=window._lastTotals||{};
  document.querySelectorAll('#view-stuffer .stat-row-val').forEach(function(el){
    var row=el.parentElement;
    var nameEl=row&&row.querySelector('.stat-row-name span');
    if(!nameEl) return;
    var k=nameEl.textContent;
    if(prevTotals[k]!==undefined&&prevTotals[k]!==currTotals[k]){
      el.classList.add('anim');
      el.addEventListener('animationend',function(){ el.classList.remove('anim'); },{once:true});
    }
  });
  window._prevTotals=Object.assign({},currTotals);
}

// ── Rendu d'un slot ──

// Vérifier si les conditions d'un item sont remplies
function checkConditions(conditions, totals){
  if(!conditions||!conditions.children||!conditions.children.length) return true;
  var relation=conditions.relation||'and';
  var results=conditions.children.map(function(child){
    if(child.is_operand&&child.condition){
      var c=child.condition;
      var statName=normalizeStatName(c.element.name);
      var val=totals[statName]||0;
      if(c.operator==='<')  return val<c.int_value;
      if(c.operator==='<=') return val<=c.int_value;
      if(c.operator==='>') return val>c.int_value;
      if(c.operator==='>=') return val>=c.int_value;
      if(c.operator==='=') return val===c.int_value;
      return true;
    }
    // Récursif pour sous-conditions
    return checkConditions(child, totals);
  });
  if(relation==='or') return results.some(function(r){return r;});
  return results.every(function(r){return r;});
}

function renderSlot(sl, item){
  var isActive=nav.activeSlot===sl.id;
  var h='<div class="eq-slot '+(item?'filled':'')+(isActive?' active':'')+'" data-slotid="'+sl.id+'" onclick="selectSlot(this.dataset.slotid)">';
  h+='<div class="slot-lbl">'+sl.lbl+'</div>';
  h+='<div class="slot-body">';
  if(item){
    if(item.icon){
      h+='<img class="slot-ico" src="'+item.icon+'" data-slotid="'+sl.id+'" onerror="this.style.display=\'none\'">';
    }
    // Nom + source
    var src=getItemSource(item);
  var dotInfo=getItemDot(item);
    h+='<div style="flex:1;min-width:0">';
    // Vérifier conditions d'équipement
    var condOk=!item.conditions||checkConditions(item.conditions,window._lastTotals||{});
    var condWarn=condOk?'':'<span style="color:var(--yellow);font-size:12px;margin-left:4px" title="Condition non remplie">⚠️</span>';
    h+='<div class="slot-item-name">'+item.name+condWarn+'</div>';
    if(src){
      h+='<div class="slot-source" style="color:'+(src.type==='bank'?'var(--green)':'var(--yellow)')+'">'+src.label+'</div>';
    }
    h+='</div>';
  if(dotInfo) h+=renderDots(dotInfo);
    h+='<button class="slot-clear" data-slotid="'+sl.id+'" onclick="event.stopPropagation();clearSlot(this.dataset.slotid)">✕</button>';
  } else {
    h+='<span class="slot-empty">'+sl.ico+' Vide</span>';
  }
  h+='</div></div>';
  return h;
}

function getItemSource(item){
  if(item.bankRef!==undefined){
    var bi=state.bank[item.bankRef];
    if(bi){
      var cname=bi.compte||'?';
      COMPTES.forEach(function(c){ if(c.id===bi.compte) cname=c.name; });
      return {type:'bank', label:cname};
    }
  }
  return null;
}

function getItemDot(item){
  if(item.bankRef===undefined) return null;
  var bankIdx=item.bankRef;
  var bi=state.bank[bankIdx];
  if(!bi) return null;
  var usageCount=0;
  COMPTES.forEach(function(c){
    c.persos.forEach(function(p){
      getBuilds(p.id).forEach(function(b){
        if(!b.slots) return;
        Object.values(b.slots).forEach(function(s){
          if(s&&s.bankRef===bankIdx) usageCount++;
        });
      });
    });
  });
  // Vérifier si l'item est sur un autre compte que le perso actuel
  var currentCompte=compteOfPerso(nav.persoId);
  var wrongCompte=currentCompte&&bi.compte&&bi.compte!==currentCompte.id;
  return {usage:usageCount, wrongCompte:wrongCompte};
}

function renderDots(dotInfo){
  if(!dotInfo) return '';
  var h='<div style="display:flex;gap:3px;flex-shrink:0">';
  if(dotInfo.usage===0) h+='<div class="slot-dot grey" title="Non utilisé"></div>';
  else if(dotInfo.usage===1) h+='<div class="slot-dot green" title="Utilisé dans 1 build"></div>';
  else h+='<div class="slot-dot yellow" title="Partagé entre plusieurs builds"></div>';
  if(dotInfo.wrongCompte) h+='<div class="slot-dot red" title="Autre compte"></div>';
  h+='</div>';
  return h;
}

// ── Sélection de slot → page dédiée ──
function selectSlot(slotId){
  if(nav.activeSlot===slotId){
    nav.activeSlot=null;
    renderStuffer();
    return;
  }
  nav.activeSlot=slotId;
  nav.selectSlotId=slotId;

  // Trouver les types acceptés
  var all=SLOTS_LEFT.concat(SLOTS_RIGHT);
  var found=null;
  for(var i=0;i<all.length;i++) if(all[i].id===slotId){ found=all[i]; break; }
  nav.selectSlotTypes=found?found.types:DOFUS_SLOTS.indexOf(slotId)>=0?DOFUS_TYPES:[];

  showView('select');
  renderSelectPage();
}

function clearSlot(slotId){
  var b=getBuild(nav.persoId,nav.buildId);
  if(!b||!b.slots) return;
  delete b.slots[slotId];
  saveState();
  renderStuffer();
}

function filterSelectItems(){
  var q=(document.getElementById('selectSearch').value||'').toLowerCase().trim();
  var cards=document.querySelectorAll('.item-card');
  cards.forEach(function(card){
    var name=card.querySelector('.item-card-name');
    if(!name){ card.style.display=''; return; }
    if(!q||name.textContent.toLowerCase().indexOf(q)>-1){
      card.style.display='';
    } else {
      card.style.display='none';
    }
  });

function equipFromBankSelect(bankIdx){
  var item=state.bank[bankIdx];
  if(!item||!nav.selectSlotId) return;
  var b=getBuild(nav.persoId,nav.buildId);
  if(!b) return;
  if(!b.slots) b.slots={};

  // Vérifier Prysmaradite : max 1 sur les 6 slots dofus
  if(item.type==='Prysmaradite'){
    var alreadyHasPrysma=DOFUS_SLOTS.some(function(sid){
      return b.slots[sid]&&b.slots[sid].type==='Prysmaradite'&&sid!==nav.selectSlotId;
    });
    if(alreadyHasPrysma){ showToast('Tu ne peux avoir qu\'une seule Prysmaradite !'); return; }
  }
  // P1 : Unicité dofus/trophées par ankama_id
  var isDofusSlot=DOFUS_SLOTS.indexOf(nav.selectSlotId)>=0;
  if(isDofusSlot&&item.ankama_id){
    var duplicate=DOFUS_SLOTS.some(function(sid){
      return sid!==nav.selectSlotId&&b.slots[sid]&&b.slots[sid].ankama_id===item.ankama_id;
    });
    if(duplicate){ showToast('Cet item est déjà dans un autre slot !'); return; }
  }

  b.slots[nav.selectSlotId]={
    name:item.name,
    icon:item.icon||'',
    type:item.type||'',
    stats:item.stats||{},
    exos:item.exos||{},
    statMaxima:item.statMaxima||{},
    bankRef:bankIdx,
    setId:item.setId||null,
    setName:item.setName||null,
    setBonuses:item.setBonuses||{},
    ankama_id:item.ankama_id||null,
    conditions:item.conditions||null
  };
  saveState();
  nav.activeSlot=null;
  showToast(item.name+' équipé !');
  showView('stuffer');
  renderStuffer();
  // Micro-animation : pop sur le slot équipé
  var slotEl=document.querySelector('[data-slotid="'+nav.selectSlotId+'"]');
  if(slotEl){
    slotEl.classList.add('just-equipped');
    slotEl.addEventListener('animationend',function(){ slotEl.classList.remove('just-equipped'); },{once:true});
  }
}

function normalizeStatName(k){
  var map={
    'Vitalite':'Vitalité','Vitalité':'Vitalité',
    'Sagesse':'Sagesse','Force':'Force','Intelligence':'Intelligence',
    'Agilite':'Agilité','Agilité':'Agilité','Chance':'Chance',
    'PA':'PA','Points d Action':'PA','PM':'PM','Points de Mouvement':'PM',
    'PO':'PO','Portee':'PO','Portée':'PO','Portée':'PO',
    'Initiative':'Initiative',
    'Critique':'% Critique','% Critique':'% Critique','Taux Critique':'% Critique',
    'Do Critique':'Do Critique','Dommage Critiques':'Do Critique','Dommages Critiques':'Do Critique',
    'Soin':'Soin','Soins':'Soin','Prospection':'Prospection','Pods':'Pods',
    'Fuite':'Fuite','Tacle':'Tacle','PI':'PI','Invocation':'PI',
    'Do Feu':'Do Feu','Dommage Feu':'Do Feu','Dommages Feu':'Do Feu',
    'Do Terre':'Do Terre','Dommage Terre':'Do Terre','Dommages Terre':'Do Terre',
    'Do Eau':'Do Eau','Dommage Eau':'Do Eau','Dommages Eau':'Do Eau',
    'Do Air':'Do Air','Dommage Air':'Do Air','Dommages Air':'Do Air',
    'Do Neutre':'Do Neutre','Dommage Neutre':'Do Neutre',
    'Ret. PA':'Ret. PA','Retrait PA':'Ret. PA',
    'Ret. PM':'Ret. PM','Retrait PM':'Ret. PM','Esquive PM':'Ret. PM',
    'Rés Terre':'Rés Terre','Résistance Terre':'Rés Terre',
    'Rés Feu':'Rés Feu','Résistance Feu':'Rés Feu',
    'Rés Eau':'Rés Eau','Résistance Eau':'Rés Eau',

    'Rés Neutre':'Rés Neutre','Résistance Neutre':'Rés Neutre',

    '% Rés Eau':'% Rés Eau','% Résistance Eau':'% Rés Eau',
    '% Rés Air':'% Rés Air','% Résistance Air':'% Rés Air',
    '% Rés Neutre':'% Rés Neutre','% Résistance Neutre':'% Rés Neutre',
    'Puissance':'Puissance'
  };
  return map[k]||k;
}

function renderStats(slots){
  var totals={};
  Object.keys(BASE_STATS).forEach(function(k){ totals[k]=BASE_STATS[k]; });
  Object.values(slots).forEach(function(item){
    if(!item) return;
    var rawStats=Object.assign({}, item.stats||{});
    if(item.bankRef!==undefined){
      var bi=state.bank[item.bankRef];
      if(bi&&bi.exos) Object.assign(rawStats, bi.exos);
    } else if(item.exos){ Object.assign(rawStats, item.exos); }
    Object.keys(rawStats).forEach(function(k){
      var n=normalizeStatName(k);
      totals[n]=(totals[n]||0)+(parseInt(rawStats[k])||0);
    });
  });
  var sets={};
  Object.values(slots).forEach(function(item){
    if(!item||!item.setId) return;
    if(!sets[item.setId]) sets[item.setId]={count:0, bonuses:item.setBonuses||{}};
    sets[item.setId].count++;
    if(item.setBonuses&&Object.keys(item.setBonuses).length) sets[item.setId].bonuses=item.setBonuses;
  });
  Object.keys(sets).forEach(function(sid){
    var s=sets[sid];
    var bonusKeys=Object.keys(s.bonuses).map(Number).sort(function(a,b){return a-b;});
    var activeBonus=null;
    bonusKeys.forEach(function(t){ if(s.count>=t) activeBonus=s.bonuses[t]; });
    if(!activeBonus) return;
    activeBonus.split(', ').forEach(function(part){
      part=part.trim();
      var m=part.match(/^([+-]?\d+)%?\s+(.+)$/);
      if(m){ var v=parseInt(m[1]); var n=normalizeStatName(m[2].trim()); if(!isNaN(v)) totals[n]=(totals[n]||0)+v; }
    });
  });
  var inv=getBuildInvested();
  if(inv){
    totals['Vitalité']=(totals['Vitalité']||0)+(inv.vita||0)+(inv.parchoVita||0);
    totals['Sagesse']=(totals['Sagesse']||0)+Math.floor((inv.sagesse||0)/3)+(inv.parchoSage||0);
    totals['Force']=(totals['Force']||0)+(inv.force||0)+(inv.parchoForce||0);
    totals['Intelligence']=(totals['Intelligence']||0)+(inv.intel||0)+(inv.parchoIntel||0);
    totals['Chance']=(totals['Chance']||0)+(inv.chance||0)+(inv.parchoChance||0);
    totals['Agilité']=(totals['Agilité']||0)+(inv.agi||0)+(inv.parchoAgi||0);
  }
  totals['PdV']=1050+(totals['Vitalité']||0);

  // Ligne compacte : icône + nom à gauche, valeur à droite
  // Ligne compacte
  var CAPS={'PA':12,'PM':6,'PO':6};
  function row(k){
    var v=totals[k]||0;
    var cls=v>0?'pos':v<0?'neg':'';
    var cap=CAPS[k];
    var warn=cap&&v>cap?'<span title="Bridé à '+cap+' par le jeu" style="color:var(--yellow);font-size:10px;margin-left:3px">⚠️</span>':'';
    var display=cap&&v>cap?cap:v;
    return '<div class="stat-row"><div class="stat-row-name">'+getStatIcon(k)+'<span>'+k+'</span></div><div class="stat-row-val '+cls+'">'+display+warn+'</div></div>';
  }

  function rowIf(k){ return row(k); }
  var h='<div class="stats-panel">';
  h+='<div class="stats-title">📊 Stats du build</div>';

  // ── CARACTÉRISTIQUES (fusionné) ──
  h+='<div class="stats-section-lbl">Caractéristiques</div>';
  h+='<div class="stats-rows-grid">';
  // Colonne gauche
  h+='<div>';
  h+=row('PdV'); h+=row('PA'); h+=row('PM'); h+=row('PO');
  h+=row('PI'); h+=rowIf('Initiative'); h+=rowIf('% Critique'); h+=rowIf('Soin');
  h+='</div>';
  // Colonne droite
  h+='<div>';
  h+=row('Vitalité'); h+=row('Sagesse'); h+=row('Force');
  h+=row('Intelligence'); h+=row('Chance'); h+=row('Agilité');
  h+=rowIf('Puissance'); h+=rowIf('Pods'); h+=rowIf('Prospection');
  h+=rowIf('Fuite'); h+=rowIf('Tacle');
  h+=rowIf('Esq. PA'); h+=rowIf('Esq. PM');
  h+=rowIf('Ret. PA'); h+=rowIf('Ret. PM');
  h+='</div>';
  h+='</div>';

  // ── DOMMAGES ──
  var dmgStats=['Do Neutre','Do Terre','Do Feu','Do Eau','Do Air','Do Critique','Do Poussée','% Do Sorts','% Do Armes','% Do Mélée','% Do Dist'];
  var dmgVals=dmgStats;
  // Dommages
  h+='<div class="stats-section-lbl">Dommages</div>';
  h+='<div class="stats-rows-grid">';
  var half=Math.ceil(dmgVals.length/2);
  h+='<div>';
  dmgVals.slice(0,half).forEach(function(k){ h+=row(k); });
  h+='</div><div>';
  dmgVals.slice(half).forEach(function(k){ h+=row(k); });
  h+='</div></div>';


  // ── RÉSISTANCES ──
  var resPctStats=['% Ré Neutre','% Ré Terre','% Ré Feu','% Ré Eau','% Ré Air','% Ré Dist','% Ré Mélée','% Ré Armes'];
  var resFixStats=['Ré Neutre','Ré Terre','Ré Feu','Ré Eau','Ré Air','Ré Critique','Ré Poussée'];
  h+='<div class="stats-section-lbl">Résistances</div>';
  h+='<div class="stats-rows-grid">';
  h+='<div>';
  resPctStats.forEach(function(k){ h+=row(k); });
  h+='</div><div>';
  resFixStats.forEach(function(k){ h+=row(k); });
  h+='</div></div>';




  h+='</div>';
  window._lastTotals=totals;
  return h;
}

// RÉPARTITION DES POINTS

function getBuildInvested(){
  var b=getBuild(nav.persoId,nav.buildId);
  if(!b) return null;
  if(!b.invested) b.invested={
    vita:0,sagesse:0,force:0,intel:0,chance:0,agi:0,
    parchoVita:0,parchoSage:0,parchoForce:0,parchoIntel:0,parchoChance:0,parchoAgi:0
  };
  return b.invested;
}

function costElem(current, toAdd){
  var cost=0; var s=current;
  for(var i=0;i<toAdd;i++){
    if(s<100) cost+=1;
    else if(s<200) cost+=2;
    else if(s<300) cost+=3;
    else cost+=4;
    s++;
  }
  return cost;
}

function calcPointsUsed(inv){
  if(!inv) return 0;
  return (inv.vita||0)+(inv.sagesse||0)*3
    +costElem(0,inv.force||0)+costElem(0,inv.intel||0)
    +costElem(0,inv.chance||0)+costElem(0,inv.agi||0);
}

function addMaxStat(key){
  var inv=getBuildInvested();
  if(!inv) return;
  var used=calcPointsUsed(inv);
  var remaining=995-used;
  if(remaining<=0){ showToast('Plus de points !'); return; }
  if(key==='vita'){ inv.vita=(inv.vita||0)+remaining; }
  else if(key==='sagesse'){
    // 1 sagesse = 3 pts
    var maxSage=Math.floor(remaining/3);
    inv.sagesse=(inv.sagesse||0)+maxSage;
  } else {
    // Paliers force/intel/chance/agi
    var cur=inv[key]||0;
    var added=0;
    var pts=remaining;
    while(pts>0){
      var cost=cur<100?1:cur<200?2:cur<300?3:4;
      if(pts<cost) break;
      pts-=cost; cur++; added++;
    }
    inv[key]=(inv[key]||0)+added;
  }
  var b=getBuild(nav.persoId,nav.buildId);
  if(b){ b.invested=inv; saveState(); }
  renderStuffer();
}

  INVEST.forEach(function(s){

function setParchoAll(val){
  var inv=getBuildInvested();
  if(!inv) return;
  ['parchoVita','parchoSage','parchoForce','parchoIntel','parchoChance','parchoAgi'].forEach(function(k){ inv[k]=val; });
  var b=getBuild(nav.persoId,nav.buildId);
  if(b){ b.invested=inv; saveState(); }
  renderStuffer();
}

function setInvestedVal(key, val){
  var inv=getBuildInvested();
  if(!inv) return;
  inv[key]=val;
  var b=getBuild(nav.persoId,nav.buildId);
  if(b){ b.invested=inv; saveState(); }
  renderStuffer();
}

function changeInvested(el){
  var key=el.getAttribute('data-key');
  var delta=parseInt(el.getAttribute('data-delta'))||0;
  var inv=getBuildInvested();
  if(!inv) return;
  var isParcho=key.indexOf('parcho')===0;
  var newVal=(inv[key]||0)+delta;
  if(newVal<0) newVal=0;
  if(isParcho&&newVal>100) newVal=100;
  inv[key]=newVal;
  if(!isParcho){
    var used=calcPointsUsed(inv);
    if(used>995){ inv[key]=inv[key]-delta; showToast('Plus de points disponibles !'); return; }
  }
  var b=getBuild(nav.persoId,nav.buildId);
  if(b){ b.invested=inv; saveState(); }
  renderStuffer();
}

function setInvested(el){
  var key=el.getAttribute('data-key');
  var val=parseInt(el.value)||0;
  if(val<0) val=0;
  var isParcho=key.indexOf('parcho')===0;
  if(isParcho&&val>100) val=100;
  var inv=getBuildInvested();
  if(!inv) return;
  var old=inv[key]||0;
  inv[key]=val;
  if(!isParcho){
    var used=calcPointsUsed(inv);
    if(used>995){ inv[key]=old; el.value=old; showToast('Plus de points disponibles !'); return; }
  }
  var b=getBuild(nav.persoId,nav.buildId);
  if(b){ b.invested=inv; saveState(); }
  renderStuffer();
}

function renderPanoplies(slots){
  var sets={};
  Object.values(slots).forEach(function(item){
    if(!item||!item.setId||!item.setName) return;
    if(!sets[item.setId]) sets[item.setId]={name:item.setName, count:0, bonuses:item.setBonuses||{}};
    sets[item.setId].count++;
    if(item.setBonuses&&Object.keys(item.setBonuses).length) sets[item.setId].bonuses=item.setBonuses;
  });
  var setKeys=Object.keys(sets);
  if(!setKeys.length) return '';

  var h='<div class="stats-panel">';
  h+='<div class="stats-title">🎲 Bonus de Panoplies</div>';
  setKeys.forEach(function(sid){
    var s=sets[sid];
    var bonusKeys=Object.keys(s.bonuses).map(Number).sort(function(a,b){return a-b;});
    h+='<div style="background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:6px">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px">';
    h+=s.name;
    h+=' <span style="background:var(--gold-light);border:1px solid var(--gold-border);border-radius:10px;padding:1px 8px;font-size:11px">'+s.count+' pcs</span></div>';
    if(bonusKeys.length){
      bonusKeys.forEach(function(t){
        var active=s.count>=t;
        var bonus=s.bonuses[t]||'';
        if(!bonus) return;
        h+='<div style="display:flex;gap:6px;align-items:flex-start;padding:4px 6px;border-radius:6px;margin-bottom:3px;'+(active?'background:var(--green-bg)':'opacity:0.4')+'">';
        h+='<span style="font-size:12px;font-weight:700;color:'+(active?'var(--green)':'var(--text-dim)')+';min-width:20px">'+(active?'✓':t+'p')+'</span>';
        h+='<span style="font-size:11px;color:'+(active?'var(--green)':'var(--text-dim)')+'">'+bonus+'</span>';
        h+='</div>';
      });
    } else {
      h+='<div style="font-size:11px;color:var(--text-dim);font-style:italic">Bonus en cours de chargement...</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}

var BANK_FILTER_TYPES=[
  {id:'free',    lbl:'Non utilisés', group:'statut'},
  {id:'shared',  lbl:'Partagés',     group:'statut'},
  {id:'other',   lbl:'Autre compte', group:'statut'},
  {id:'Chapeau', lbl:'Coiffe',       group:'type'},
  {id:'Amulette',lbl:'Amulette',     group:'type'},
  {id:'Cape',    lbl:'Cape',         group:'type'},
  {id:'Anneau',  lbl:'Anneau',       group:'type'},
  {id:'Ceinture',lbl:'Ceinture',     group:'type'},
  {id:'Bottes',  lbl:'Bottes',       group:'type'},
  {id:'Arme',    lbl:'Arme',         group:'type'},
  {id:'Bouclier',lbl:'Bouclier',     group:'type'},
  {id:'Familier',lbl:'Familier/Monture',group:'type'},
  {id:'Dofus',   lbl:'Dofus',        group:'type'},
  {id:'Trophée', lbl:'Trophée',      group:'type'},
  {id:'Prysmaradite',lbl:'Prysmaradite',group:'type'},
];

function toggleBankFilter(fid){
  var idx=nav.bankFilters.indexOf(fid);
  if(idx>=0) nav.bankFilters.splice(idx,1);
  else nav.bankFilters.push(fid);
  renderBank();
}

function bankItemMatchesFilters(item, idx){
  if(!nav.bankFilters.length) return true;
  var dotInfo=getItemDotFromBank(idx);
  var passes=true;
  nav.bankFilters.forEach(function(fid){
    if(fid==='free'   && dotInfo.usage!==0) passes=false;
    if(fid==='shared' && dotInfo.usage<=1)  passes=false;
    if(fid==='other'  && !dotInfo.wrongCompte) passes=false;
    if(fid==='Familier'){
      var t=item.type||'';
      var famTypes=['Familier','Dragodinde','Montilier','Muldo','Volkorne'];
      if(!famTypes.some(function(ft){return t.toLowerCase().indexOf(ft.toLowerCase())>-1;})) passes=false;
    } else if(!['free','shared','other'].includes(fid)){
      var t2=item.type||'';
      if(t2.toLowerCase().indexOf(fid.toLowerCase())<0) passes=false;
    }
  });
  return passes;
}

function renderBank(){
  var filtered=state.bank.filter(function(item,idx){ return bankItemMatchesFilters(item,idx); });
  var h='<div class="bank-header">';
  h+='<div style="font-family:Cinzel,serif;font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase">'+filtered.length+'/'+state.bank.length+' items</div>';
  h+='<button class="bank-add-btn" onclick="openModalBank(null)">+ Ajouter</button>';
  h+='</div>';

  // ── Filtres ──
  h+='<div style="padding:0 12px 8px">';
  // Groupe statut
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">';
  BANK_FILTER_TYPES.filter(function(f){return f.group==='statut';}).forEach(function(f){
    var active=nav.bankFilters.indexOf(f.id)>=0;
    h+='<button class="bank-filter'+(active?' active':'')+'" onclick="toggleBankFilter('+String.fromCharCode(39)+f.id+String.fromCharCode(39)+')">';
    h+=f.lbl+'</button>';
  });
  h+='</div>';
  // Groupe type
  h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">';
  BANK_FILTER_TYPES.filter(function(f){return f.group==='type';}).forEach(function(f){
    var active=nav.bankFilters.indexOf(f.id)>=0;
    h+='<button class="bank-filter'+(active?' active':'')+'" onclick="toggleBankFilter('+String.fromCharCode(39)+f.id+String.fromCharCode(39)+')">';
    h+=f.lbl+'</button>';
  });
  if(nav.bankFilters.length){
    h+='<button onclick="nav.bankFilters=[];renderBank()" style="background:var(--red);border:none;color:#fff;font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;cursor:pointer">✕ Réinitialiser</button>';
  }
  h+='</div></div>';

  if(!state.bank.length){
    h+='<div class="empty-state" style="margin:12px">Ta banque est vide.<br><br>Ajoute tes équipements pour les utiliser dans tes builds !</div>';
  } else if(!filtered.length){
    h+='<div class="empty-state" style="margin:12px">Aucun item ne correspond aux filtres sélectionnés.</div>';
  } else {
    h+='<div class="bank-list">';
    state.bank.forEach(function(item,idx){
      if(bankItemMatchesFilters(item,idx)) h+=renderBankCard(item,idx);
    });
    h+='</div>';
  }

  document.getElementById('view-bank').innerHTML=h;
}

function renderBankCard(item, idx){
  var dotInfo=getItemDotFromBank(idx);
  // Builds qui utilisent cet item
  var usages=[];
  COMPTES.forEach(function(c){
    c.persos.forEach(function(p){
      getBuilds(p.id).forEach(function(b){
        if(!b.slots) return;
        Object.values(b.slots).forEach(function(s){
          if(s&&s.bankRef===idx) usages.push(p.name+' — '+b.name);
        });
      });
    });
  });

  var h='<div class="bank-item">';
  // Pastille
  h+=renderDots(dotInfo).replace('slot-dot','bank-item-dot');
  if(item.icon){
    h+='<img class="bank-item-ico" src="'+item.icon+'" onerror="this.style.display=\'none\'">';
  } else {
    h+='<div class="bank-item-ico" style="display:flex;align-items:center;justify-content:center;font-size:22px">⚔️</div>';
  }
  h+='<div class="bank-item-body">';
  h+='<div class="bank-item-name">'+item.name+'</div>';
  h+='<div class="bank-item-meta">';
  h+=item.type||'';
  var cname=item.compte||'?';
  COMPTES.forEach(function(c){ if(c.id===item.compte) cname=c.name; });
  h+='<span>'+cname+'</span>';
  h+='</div>';
  // Stats
  var stats=item.stats||{};
  if(Object.keys(stats).length){
    h+='<div class="bank-item-stats">';
    Object.keys(stats).forEach(function(k){
      var v=parseInt(stats[k])||0;
      if(!v) return;
      var maxV=(item.statMaxima&&item.statMaxima[k])||0;
      var isOver=maxV>0&&v>maxV;
      var chipCls=isOver?'stat-chip over-chip':(v>0?'stat-chip pos':'stat-chip neg');
      h+='<span class="'+chipCls+'">'+(v>0?'+':'')+v+' '+k+(isOver?' ⚡':'')+'</span>';
    });
    h+='</div>';
  }
  var exos=item.exos||{};
  if(Object.keys(exos).length){
    h+='<div class="bank-item-stats" style="margin-top:3px">';
    Object.keys(exos).forEach(function(k){
      var v=parseInt(exos[k])||0;
      if(!v) return;
      h+='<span class="stat-chip exo">⚡ '+(v>0?'+':'')+v+' '+k+'</span>';
    });
    h+='</div>';
  }
  // Usages
  if(usages.length){
    h+='<div class="bank-item-usage">Utilisé dans : '+usages.join(', ')+'</div>';
  }
  h+='<div class="bank-item-actions">';
  h+='<button class="bank-btn primary" data-idx="'+idx+'" onclick="openModalBank(parseInt(this.dataset.idx))">✏️ Modifier</button>';
  h+='</div>';
  h+='</div></div>';
  return h;
}
