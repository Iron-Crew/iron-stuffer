function openModalBank(idx){
  modalBankData={item:null, editIdx:idx, compte:null, nativeKeys:[]};
  document.getElementById('modalBankTitle').textContent=idx!==null?'Modifier un item':'Ajouter un item';
  document.getElementById('modalBankDelete').style.display=idx!==null?'block':'none';
  document.getElementById('modalSearchSection').style.display='block';
  document.getElementById('modalItemSection').style.display='none';
  document.getElementById('modalSearchInput').value='';
  document.getElementById('modalSearchResults').innerHTML='';
  document.getElementById('exoAddSection').style.display='none';

  // Remplir select exo
  var sel=document.getElementById('exoStatSelect');
  sel.innerHTML='';
  STATS_LIST.forEach(function(s){
    var opt=document.createElement('option');
    opt.value=s; opt.textContent=s;
    sel.appendChild(opt);
  });

  if(idx!==null){
    var item=state.bank[idx];
    if(item) preloadModalItem(item);
  }

  renderCompteChips();
  document.getElementById('modalBank').classList.add('active');
}

function preloadModalItem(item){
  modalBankData.item={name:item.name,icon:item.icon||'',type:item.type||'',stats:Object.assign({},item.stats||{}),exos:Object.assign({},item.exos||{})};
  modalBankData.nativeKeys=item.nativeKeys||Object.keys(item.stats||{});
  modalBankData.compte=item.compte||null;
  showModalItem(item.name,item.icon||'',item.type||'',item.stats||{},modalBankData.nativeKeys);
}

function renderCompteChips(){
  var h='';
  COMPTES.forEach(function(c){
    var isActive=modalBankData.compte===c.id;
    h+='<div class="compte-chip '+(isActive?'active':'')+'" data-cid="'+c.id+'" onclick="selectCompte(this)">'+c.name+'</div>';
  });
  document.getElementById('modalCompteChips').innerHTML=h;
}

function selectCompte(el){
  modalBankData.compte=el.getAttribute('data-cid');
  document.querySelectorAll('.compte-chip').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
}

function modalSearch(){
  var q=(document.getElementById('modalSearchInput').value||'').trim();
  if(q.length<2){ showToast('Tape au moins 2 lettres'); return; }
  var el=document.getElementById('modalSearchResults');
  el.innerHTML='<div class="loading"><span class="spinner"></span>Recherche...</div>';

  fetch(API+'/items/equipment/search?query='+encodeURIComponent(q)+'&limit=15')
    .then(function(r){return r.json();})
    .then(function(data){
      modalSearchCache=data||[];
      var h='';
      modalSearchCache.slice(0,10).forEach(function(item,idx){
        var ico=item.image_urls&&item.image_urls.icon?item.image_urls.icon:'';
        var type=item.type&&item.type.name?item.type.name:'';
        h+='<div class="modal-result-row" data-midx="'+idx+'" onclick="selectModalItem(parseInt(this.dataset.midx))">';
        if(ico) h+='<img class="modal-result-ico" src="'+ico+'" onerror="this.style.display=\'none\'">';
        else h+='<div class="modal-result-ico" style="display:flex;align-items:center;justify-content:center;font-size:16px">⚔️</div>';
        h+='<div><div class="modal-result-name">'+item.name+'</div><div class="modal-result-type">'+type+'</div></div>';
        h+='</div>';
      });
      el.innerHTML=h||'<div class="empty-state">Aucun résultat</div>';
    })
    .catch(function(){ el.innerHTML='<div class="empty-state">Erreur réseau</div>'; });
}

function selectModalItem(idx){
  var item=modalSearchCache[idx];
  if(!item) return;
  var ico=item.image_urls&&item.image_urls.icon?item.image_urls.icon:'';
  var type=item.type&&item.type.name?item.type.name:'';
  modalBankData.item={name:item.name,icon:ico,type:type,stats:{},exos:{},ankama_id:item.ankama_id||null};
  modalBankData.nativeKeys=[];
  showModalItem(item.name,ico,type,{},[]);
  document.getElementById('modalStatGrid').innerHTML='<div class="loading"><span class="spinner"></span>Chargement des stats...</div>';

  fetch(API+'/items/equipment/'+item.ankama_id)
    .then(function(r){return r.json();})
    .then(function(full){
      var stats={};
      var nativeKeys=[];
      var statMaxima={}; // jet max de l'API par stat
      if(full.effects){
        full.effects.forEach(function(eff){
          if(!eff.type||!eff.type.name) return;
          var maxVal=eff.int_maximum&&eff.int_maximum!==0?eff.int_maximum:(eff.int_minimum||0);
          if(!maxVal) return;
          var k=eff.type.name;
          stats[k]=(stats[k]||0)+maxVal;
          statMaxima[k]=(statMaxima[k]||0)+maxVal;
          if(nativeKeys.indexOf(k)<0) nativeKeys.push(k);
        });
      }
      var setInfo=full.parent_set||full.set||null;
      if(setInfo&&(setInfo.id||setInfo.ankama_id)){
        modalBankData.item.setId=setInfo.id||setInfo.ankama_id;
        modalBankData.item.setName=setInfo.name||'Panoplie';
        modalBankData.item.setBonuses={};
        // Fetch bonus panoplie
        fetch(API+'/sets/'+(setInfo.id||setInfo.ankama_id))
          .then(function(r2){return r2.json();})
          .then(function(setData){
            var bonuses={};
            var effObj=setData.effects||{};
            Object.keys(effObj).forEach(function(minCount){
              var items=effObj[minCount];
              if(!items||!Array.isArray(items)) return;
              var parts=[];
              items.forEach(function(e){
                if(e.formatted) parts.push(e.formatted);
                else {
                  var v=e.int_minimum||0;
                  var n=e.type&&e.type.name?e.type.name:'?';
                  if(v) parts.push((v>0?'+':'')+v+' '+n);
                }
              });
              if(parts.length) bonuses[parseInt(minCount)]=parts.join(', ');
            });
            modalBankData.item.setBonuses=bonuses;
          }).catch(function(){});
      }
      modalBankData.item.stats=stats;
      modalBankData.item.statMaxima=statMaxima;
      // Stocker les conditions d'équipement
      modalBankData.item.conditions=full.conditions||null;
      modalBankData.nativeKeys=nativeKeys;
      renderModalStats();
    })
    .catch(function(){
      document.getElementById('modalStatGrid').innerHTML='<div style="color:var(--red);padding:8px">Erreur chargement</div>';
    });
}

function showModalItem(name,ico,type,stats,nativeKeys){
  document.getElementById('modalSearchSection').style.display='none';
  document.getElementById('modalItemSection').style.display='block';
  document.getElementById('modalItemName').textContent=name;
  document.getElementById('modalItemType').textContent=type;
  if(ico) document.getElementById('modalItemIco').src=ico;
  modalBankData.nativeKeys=nativeKeys||Object.keys(stats);
  modalBankData.item.stats=Object.assign({},stats);
  if(!modalBankData.item.exos) modalBankData.item.exos={};
  renderModalStats();
  renderCompteChips();
}

function renderModalStats(){
  var stats=modalBankData.item.stats||{};
  var exos=modalBankData.item.exos||{};
  var nativeKeys=modalBankData.nativeKeys||[];
  var statMaxima=modalBankData.item.statMaxima||{};
  var h='';

  h+='<div class="modal-section-title" style="margin-bottom:6px">Stats (ton jet réel)</div>';
  if(nativeKeys.length){
    h+='<div class="stat-edit-grid">';
    nativeKeys.forEach(function(k){
      var v=stats[k]!==undefined?stats[k]:0;
      var maxV=statMaxima[k]||0;
      var isOver=maxV>0&&v>maxV;
      h+='<div class="stat-edit-row'+(isOver?' stat-over':'')+'">'; 
      h+='<span class="stat-edit-name'+(isOver?' over-name':'')+'">'+k+(isOver?' ⚡':'')+'</span>';
      h+='<input class="stat-edit-input" type="number" value="'+v+'" data-stat="'+k+'" data-type="native" data-max="'+maxV+'" onchange="updateModalStat(this)">';
      h+='</div>';
    });
    h+='</div>';
  } else {
    h+='<div style="font-size:12px;color:var(--text-dim);padding:8px 0">Aucune stat détectée</div>';
  }

  // Exos existants
  var exoKeys=Object.keys(exos);
  if(exoKeys.length){
    h+='<div class="modal-section-title" style="margin-top:8px;margin-bottom:6px">Forgemagies</div>';
    h+='<div class="stat-edit-grid">';
    exoKeys.forEach(function(k){
      h+='<div class="exo-row">';
      h+='<span class="exo-name">⚡ '+k+'</span>';
      h+='<input class="stat-edit-input" type="number" value="'+exos[k]+'" data-stat="'+k+'" data-type="exo" onchange="updateModalStat(this)">';
      h+='<button data-exokey="'+k+'" onclick="removeExo(this.dataset.exokey)" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 3px">✕</button>';
      h+='</div>';
    });
    h+='</div>';
  }

  document.getElementById('modalStatGrid').innerHTML=h;
}

function toggleAddExo(){
  var el=document.getElementById('exoAddSection');
  el.style.display=el.style.display==='none'?'block':'none';
}

function confirmAddExo(){
  var k=document.getElementById('exoStatSelect').value;
  var v=parseInt(document.getElementById('exoValInput').value)||0;
  if(!k||!v){ showToast('Stat et valeur requises'); return; }
  if(!modalBankData.item.exos) modalBankData.item.exos={};
  modalBankData.item.exos[k]=v;
  document.getElementById('exoValInput').value='';
  document.getElementById('exoAddSection').style.display='none';
  renderModalStats();
}

function removeExo(k){
  if(modalBankData.item.exos) delete modalBankData.item.exos[k];
  renderModalStats();
}

function updateModalStat(el){
  var k=el.getAttribute('data-stat');
  var t=el.getAttribute('data-type');
  var v=parseInt(el.value)||0;
  var maxV=parseInt(el.getAttribute('data-max'))||0;
  if(t==='exo'){
    if(!modalBankData.item.exos) modalBankData.item.exos={};
    modalBankData.item.exos[k]=v;
  } else {
    modalBankData.item.stats[k]=v;
    // Marquer visuellement si over
    var row=el.parentElement;
    if(maxV>0&&v>maxV){ row.classList.add('stat-over'); el.previousElementSibling&&el.previousElementSibling.classList.add('over-name'); }
    else { row.classList.remove('stat-over'); el.previousElementSibling&&el.previousElementSibling.classList.remove('over-name'); }
  }
}

function saveBankItem(){
  if(!modalBankData.item){ showToast('Sélectionne un item'); return; }
  if(!modalBankData.compte){ showToast('Choisis un compte'); return; }

  var entry={
    name:modalBankData.item.name,
    icon:modalBankData.item.icon||'',
    type:modalBankData.item.type||'',
    stats:modalBankData.item.stats||{},
    exos:modalBankData.item.exos||{},
    compte:modalBankData.compte,
    nativeKeys:modalBankData.nativeKeys||[],
    setId:modalBankData.item.setId||null,
    setName:modalBankData.item.setName||null,
    setBonuses:modalBankData.item.setBonuses||{},
    statMaxima:modalBankData.item.statMaxima||{},
    conditions:modalBankData.item.conditions||null,
    ankama_id:modalBankData.item.ankama_id||null
  };

  if(modalBankData.editIdx!==null){
    state.bank[modalBankData.editIdx]=entry;
  } else {
    state.bank.push(entry);
  }
  saveState();
  closeModal('modalBank');
  renderBank();
  showToast(entry.name+(modalBankData.editIdx!==null?' modifié !':' ajouté !'));
}

function deleteBankItem(){
  if(modalBankData.editIdx===null) return;
  if(!confirm('Supprimer cet item ?')) return;
  state.bank.splice(modalBankData.editIdx,1);
  // Mettre à jour les bankRef dans les builds
  COMPTES.forEach(function(c){
    c.persos.forEach(function(p){
      getBuilds(p.id).forEach(function(b){
        if(!b.slots) return;
        Object.keys(b.slots).forEach(function(sid){
          var s=b.slots[sid];
          if(!s) return;
          if(s.bankRef===modalBankData.editIdx) delete b.slots[sid];
          else if(s.bankRef>modalBankData.editIdx) s.bankRef--;
        });
      });
    });
  });
  saveState();
  closeModal('modalBank');
  renderBank();
  showToast('Item supprimé');
}

// MODAL BUILD
// ════════════════════════════════════════════════
function openModalBuild(pid,bid){
  modalBuildData={persoId:pid, buildId:bid};
  document.getElementById('modalBuildTitle').textContent=bid?'Modifier le build':'Nouveau build';
  document.getElementById('modalBuildDelete').style.display=bid?'block':'none';
  var b=bid?getBuild(pid,bid):null;
  document.getElementById('modalBuildInput').value=b?b.name:'';
  document.getElementById('modalBuild').classList.add('active');
}

function saveBuildName(){
  var name=(document.getElementById('modalBuildInput').value||'').trim();
  if(!name){ showToast('Donne un nom au build'); return; }
  var pid=modalBuildData.persoId;
  var bid=modalBuildData.buildId;
  if(!state.builds[pid]) state.builds[pid]=[];
  if(bid){
    var b=getBuild(pid,bid);
    if(b) b.name=name;
  } else {
    var newBuild={id:'b_'+Date.now(), name:name, slots:{}, invested:{
      vita:0,sagesse:0,force:0,intel:0,chance:0,agi:0,
      parchoVita:0,parchoSage:0,parchoForce:0,parchoIntel:0,parchoChance:0,parchoAgi:0
    }};
    state.builds[pid].push(newBuild);
  }
  saveState();
  closeModal('modalBuild');
  renderBuilds();
  showToast(bid?'Build modifié':'Build créé !');
}

function deleteBuild(){
  var pid=modalBuildData.persoId;
  var bid=modalBuildData.buildId;
  if(!bid) return;
  if(!confirm('Supprimer ce build ?')) return;
  state.builds[pid]=(state.builds[pid]||[]).filter(function(b){return b.id!==bid;});
  saveState();
  closeModal('modalBuild');
  renderBuilds();
  showToast('Build supprimé');
}

function closeModal(id){
  document.getElementById(id).classList.remove('active');
}

function showTooltip(e, slotId){
  var b=getBuild(nav.persoId,nav.buildId);
  if(!b||!b.slots) return;
  var item=b.slots[slotId];
  if(!item) return;
  var tip=document.getElementById('stuffTooltip');
  if(!tip) return;
  var stats=Object.assign({},item.stats||{});
  var exos={};
  var statMaxima={};
  if(item.bankRef!==undefined){
    var bi=state.bank[item.bankRef];
    if(bi){ exos=bi.exos||{}; statMaxima=bi.statMaxima||{}; }
  } else {
    exos=item.exos||{};
    statMaxima=item.statMaxima||{};
  }
  var h='<div style="font-weight:700;font-size:13px;color:var(--gold2);margin-bottom:3px">'+item.name+'</div>';
  if(item.type) h+='<div style="font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">'+item.type+'</div>';
  var keys=Object.keys(stats);
  keys.forEach(function(k){
    var v=parseInt(stats[k])||0;
    if(!v) return;
    var maxV=statMaxima[k]||0;
    var isOver=maxV>0&&v>maxV;
    var col=isOver?'var(--gold2)':'rgba(255,255,255,0.9)';
    var ico=getStatIcon(k);
    h+='<div style="font-size:11px;color:'+col+';display:flex;gap:5px;align-items:center;padding:1px 0">';
    h+='<span style="width:16px;text-align:center">'+ico+'</span>';
    h+='<span>'+(v>0?'+':'')+v+' '+k+(isOver?' ⚡':'')+'</span>';
    h+='</div>';
  });
  var exoKeys=Object.keys(exos);
  if(exoKeys.length){
    h+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(155,127,212,0.4)">';
    exoKeys.forEach(function(k){
      var v=parseInt(exos[k])||0;
      if(!v) return;
      var ico=getStatIcon(k);
      h+='<div style="font-size:11px;color:var(--gold2);display:flex;gap:5px;align-items:center;padding:1px 0">';
      h+='<span style="width:16px;text-align:center">'+ico+'</span>';
      h+='<span>⚡ '+(v>0?'+':'')+v+' '+k+'</span>';
      h+='</div>';
    });
    h+='</div>';
  }
  if(!keys.length&&!exoKeys.length){
    h+='<div style="font-size:11px;color:rgba(255,255,255,0.4);font-style:italic">Aucune stat</div>';
  }
  tip.innerHTML=h;
  tip.style.display='block';
  tip.style.left=(e.pageX+14)+'px';
  tip.style.top=Math.max(10,e.pageY-10)+'px';
}

function hideTooltip(){
  var tip=document.getElementById('stuffTooltip');
  if(tip) tip.style.display='none';
}

// Listener permanent sur document.body
(function setupTooltip(){
  document.body.addEventListener('mouseover', function(e){
    var el=e.target;
    if(!el||el.tagName!=='IMG') return;
    var slotId=el.dataset&&el.dataset.slotid;
    if(!slotId) return;
    showTooltip(e, slotId);
  });
  document.body.addEventListener('mousemove', function(e){
    var tip=document.getElementById('stuffTooltip');
    if(tip&&tip.style.display==='block'){
      tip.style.left=(e.pageX+14)+'px';
      tip.style.top=Math.max(10,e.pageY-10)+'px';
    }
  });
  document.body.addEventListener('mouseout', function(e){
    var el=e.target;
    if(el&&el.tagName==='IMG'&&el.dataset&&el.dataset.slotid) hideTooltip();
  });
})();

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

// MIGRATION DONNÉES v1 → v2
// ════════════════════════════════════════════════
function migrateFromV1(){
  try{
    var old=JSON.parse(localStorage.getItem('iron_stuffer_v1')||'{}');
    var current=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(old.bank&&old.bank.length&&(!current.bank||!current.bank.length)){
      state.bank=old.bank;
      if(old.builds) state.builds=old.builds;
      saveState();
      showToast('Données migrées depuis v1 !');
    }
  }catch(e){}
}

};

window._fbUser = null;
window._fsDb = null;
window._syncPending = false;
window._syncTimer = null;

function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    window._fsDb = firebase.firestore();
    // Persistence offline (cache local si pas de connexion)
    window._fsDb.enablePersistence({synchronizeTabs:true}).catch(function(){});

    firebase.auth().onAuthStateChanged(function(user){
      window._fbUser = user;
      if(user){
        updateAuthBtn(user);
        loadFromFirestore(function(){
          renderPersos();
          renderBank();
          if(nav.view==='stuffer') renderStuffer();
        });
      } else {
        updateAuthBtn(null);
      }
    });
  }catch(e){
    console.warn('Firebase init error', e);
  }
}

function loadFromFirestore(cb){
  if(!window._fbUser || !window._fsDb){ if(cb) cb(); return; }
  updateSyncDot('syncing');
  window._fsDb.collection('users').doc(window._fbUser.uid)
    .collection('data').doc('state').get()
    .then(function(doc){
      if(doc.exists){
        var d=doc.data();
        // Merge : Firestore gagne sur localStorage sauf si localStorage est plus récent
        var localRaw=null;
        try{ localRaw=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }catch(e){}
        var localUpdated=localRaw&&localRaw.updatedAt?localRaw.updatedAt:'';
        var remoteUpdated=d.updatedAt||'';
        if(remoteUpdated>=localUpdated){
          state.builds=d.builds||{};
          state.bank=d.bank||[];
          // Mettre aussi à jour le localStorage comme cache
          try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({builds:state.builds, bank:state.bank, updatedAt:remoteUpdated})); }catch(e){}
        } else {
          // localStorage plus récent → on upload vers Firestore
          saveState();
        }
      } else {
        // Première connexion : on upload le localStorage existant
        saveState();
      }
      updateSyncDot('ok');
      if(cb) cb();
    }).catch(function(e){
      console.warn('Firestore load error', e);
      updateSyncDot('offline');
      if(cb) cb();
    });
}

function handleAuth(){
  if(window._fbUser){
    // Déjà connecté → proposer déconnexion
    if(confirm('Te déconnecter de la synchro cloud ? Tes données restent en local.')){
      firebase.auth().signOut();
    }
  } else {
    // Connexion Google
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider).catch(function(e){
      showToast('Connexion annulée');
    });
  }
}

function updateAuthBtn(user){
  var btn=document.getElementById('authBtn');
  if(!btn) return;
  if(user){
    var name=user.displayName?user.displayName.split(' ')[0]:user.email;
    btn.textContent=name;
    btn.className='auth-btn connected';
    btn.title='Connecté — cliquer pour déconnecter';
  } else {
    btn.textContent='☁️ Sync';
    btn.className='auth-btn';
    btn.title='Se connecter pour synchroniser sur tous tes appareils';
  }
}

function updateSyncDot(status){
  // Affiche l'état de sync dans le sous-titre du header si on est connecté
  var sub=document.getElementById('hdrSub');
  if(!sub||nav.view!=='persos') return;
  if(status==='ok'){
    sub.innerHTML='<span class="sync-dot ok"></span>Synchro cloud OK';
  } else if(status==='syncing'){
    sub.innerHTML='<span class="sync-dot syncing"></span>Synchronisation...';
  } else {
    sub.innerHTML='<span class="sync-dot offline"></span>Hors ligne';
  }
}

// DARK MODE
// ════════════════════════════════════════════════
function applyTheme(dark){
  document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  var btn=document.getElementById('themeToggle');
  if(btn) btn.textContent=dark?'☀️':'🌙';
}

function toggleTheme(){
  var isDark=document.documentElement.getAttribute('data-theme')==='dark';
  var next=!isDark;
  applyTheme(next);
  try{ localStorage.setItem('iron_theme', next?'dark':'light'); }catch(e){}
}

// Appliquer thème sauvegardé
(function(){
  var saved=null;
  try{ saved=localStorage.getItem('iron_theme'); }catch(e){}
  applyTheme(saved==='dark');
})();
